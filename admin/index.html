<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容管理 - Ghost0190</title>
</head>
<body>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      if (token) {
        sessionStorage.setItem('decap_oauth_token', token);
        window.location.replace(window.location.pathname);
      }
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.6.1/dist/decap-cms.js"
    onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/decap-cms@3.6.1/dist/decap-cms.js';document.head.appendChild(s);">
  </script>

  <script>
    (function() {
      var token = sessionStorage.getItem('decap_oauth_token');
      if (!token) return;
      sessionStorage.removeItem('decap_oauth_token');

      var attempts = 0;
      function tryDispatch() {
        attempts++;
        if (window.CMS && window.CMS.store && window.CMS.store.dispatch) {
          window.CMS.store.dispatch({
            type: 'AUTH_SUCCESS',
            payload: { token: token, provider: 'github', backendName: 'github' }
          });
        } else if (attempts < 30) {
          setTimeout(tryDispatch, 500);
        }
      }
      setTimeout(tryDispatch, 1500);
    })();
  </script>
</body>
</html>
