<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容管理 - Ghost0190</title>
</head>
<body>
  <script>
    // 第一步：从 query string 读 token，存 sessionStorage 后跳转干净 URL
    (function() {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token');
      if (token) {
        sessionStorage.setItem('decap_oauth_token', token);
        window.location.replace(window.location.pathname);
      }
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.6.1/dist/decap-cms.js"
    onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/decap-cms@3.6.1/dist/decap-cms.js';document.head.appendChild(s);">
  </script>

  <script>
    // 第二步：从 sessionStorage 拿 token，用 iframe 以正确 origin 发 postMessage
    (function() {
      var token = sessionStorage.getItem('decap_oauth_token');
      if (!token) return;
      sessionStorage.removeItem('decap_oauth_token');

      var check = setInterval(function() {
        if (window.CMS) {
          clearInterval(check);
          var iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = 'https://decap-oauth.099115.xyz/complete?token=' + encodeURIComponent(token);
          document.body.appendChild(iframe);
        }
      }, 200);
    })();
  </script>
</body>
</html>
