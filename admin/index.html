<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容管理 - Ghost0190</title>
</head>
<body>
  <script>
    // 第一步：OAuth 回调回来 token 存 sessionStorage，清 URL
    (function() {
      var hash = window.location.hash || '';
      var match = hash.match(/[?&]token=([^&]+)/);
      if (match) {
        sessionStorage.setItem('decap_oauth_token', match[1]);
        var clean = window.location.hash.replace(/[?&]token=[^&]+/, '').replace(/^#\?&/, '#/').replace(/^#$/, '');
        window.location.replace(window.location.pathname + clean);
      }
    })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.6.1/dist/decap-cms.js"
    onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/decap-cms@3.6.1/dist/decap-cms.js';document.head.appendChild(s);">
  </script>

  <script>
    // 第二步：从 sessionStorage 拿 token，通过 iframe 以正确 origin 发 postMessage
    (function() {
      var token = sessionStorage.getItem('decap_oauth_token');
      if (!token) return;
      sessionStorage.removeItem('decap_oauth_token');

      var check = setInterval(function() {
        if (window.CMS) {
          clearInterval(check);
          // 用隐藏 iframe 代替 popup，不会被浏览器拦截
          var iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = 'https://decap-oauth.099115.xyz/complete?token=' + encodeURIComponent(token);
          document.body.appendChild(iframe);
        }
      }, 200);
    })();
  </script>
</body>
</html>
