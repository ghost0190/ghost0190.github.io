<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容管理 - Ghost0190</title>
</head>
<body>
  <script>
    // 检测 OAuth 回调带回来的 token
    var match = window.location.hash.match(/[?&]token=([^&]+)/);
    if (match) {
      window.__DECAP_TOKEN = match[1];
      // 清理 URL，去掉 token
      var cleanHash = window.location.hash.replace(/[?&]token=[^&]+/, '').replace(/^#\?&/, '#/').replace(/^#$/, '');
      window.location.replace(window.location.pathname + cleanHash);
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.6.1/dist/decap-cms.js"
    onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/decap-cms@3.6.1/dist/decap-cms.js';document.head.appendChild(s);">
  </script>

  <script>
    if (window.__DECAP_TOKEN) {
      // 等 Decap CMS 加载完成，从正确 origin 发送 postMessage
      var check = setInterval(function() {
        if (window.CMS) {
          clearInterval(check);
          window.open(
            'https://decap-oauth.099115.xyz/complete?token=' + window.__DECAP_TOKEN,
            'decapAuth',
            'width=1,height=1'
          );
        }
      }, 200);
    }
  </script>
</body>
</html>
