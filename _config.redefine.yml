inject:
  head:
    # ... 其他配置 ...
  body:
    bottom:
      # 插入这段 JS 代码，专门解决 PJAX 导致加密失效的问题
      - <script>
        document.addEventListener('swup:contentReplaced', function () {
        // 如果检测到加密插件的对象存在，就强制重新初始化
        if (window.hexo_blog_encrypt) {
        window.hexo_blog_encrypt.init();
        }
        });
        </script>

